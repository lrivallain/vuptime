<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="azureBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8764b8"/>
      <stop offset="100%" stop-color="#6b4fa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#107c10"/>
      <stop offset="100%" stop-color="#0b5e0b"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ca5010"/>
      <stop offset="100%" stop-color="#a5400d"/>
    </linearGradient>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0078d4"/>
    </marker>
    <marker id="arrowAzure" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#005a9e"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ca5010"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0b5e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="380" rx="12" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#333">How plugins contribute to AI integration</text>

  <!-- ═══════════════ Consumers label ═══════════════ -->
  <text x="390" y="52" text-anchor="middle" font-size="11" fill="#999" font-style="italic">MCP consumers</text>

  <!-- ═══════════════ AI Chat Panel (left consumer) ═══════════════ -->
  <rect x="40" y="60" width="210" height="52" rx="10" fill="url(#azureBlue)" filter="url(#shadow)"/>
  <text x="145" y="82" text-anchor="middle" fill="white" font-weight="600" font-size="14">AI Chat Panel</text>
  <text x="145" y="98" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Azure OpenAI · Tool calling</text>

  <!-- ═══════════════ CLI Chat (center consumer) ═══════════════ -->
  <rect x="285" y="60" width="210" height="52" rx="10" fill="url(#azureBlue)" filter="url(#shadow)"/>
  <text x="390" y="82" text-anchor="middle" fill="white" font-weight="600" font-size="14">CLI Chat</text>
  <text x="390" y="98" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Terminal · Rich · Slash commands</text>

  <!-- ═══════════════ External AI Agents (right consumer) ═══════════════ -->
  <rect x="530" y="60" width="210" height="52" rx="10" fill="url(#azureBlue)" filter="url(#shadow)"/>
  <text x="635" y="82" text-anchor="middle" fill="white" font-weight="600" font-size="14">External AI Agents</text>
  <text x="635" y="98" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Claude · VS Code Copilot · …</text>

  <!-- ═══════════════ MCP Server (center) ═══════════════ -->
  <rect x="280" y="145" width="220" height="52" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="390" y="167" text-anchor="middle" fill="white" font-weight="600" font-size="14">MCP Server</text>
  <text x="390" y="183" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">Streamable HTTP · stdio</text>

  <!-- Arrow Chat → MCP -->
  <line x1="200" y1="112" x2="320" y2="145" stroke="#005a9e" stroke-width="1.5" marker-end="url(#arrowAzure)"/>
  <!-- Arrow CLI Chat → MCP -->
  <line x1="390" y1="112" x2="390" y2="145" stroke="#005a9e" stroke-width="1.5" marker-end="url(#arrowAzure)"/>
  <!-- Arrow Agents → MCP -->
  <line x1="580" y1="112" x2="460" y2="145" stroke="#005a9e" stroke-width="1.5" marker-end="url(#arrowAzure)"/>

  <!-- ═══════════════ Core Tools (left) ═══════════════ -->
  <rect x="40" y="220" width="170" height="100" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="125" y="244" text-anchor="middle" fill="white" font-weight="600" font-size="13">Core Tools</text>
  <text x="125" y="264" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">list_tenants</text>
  <text x="125" y="278" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">list_subscriptions</text>
  <text x="125" y="292" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">get_zone_mappings</text>
  <text x="125" y="306" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">get_sku_availability …</text>

  <!-- Arrow Core → MCP -->
  <line x1="170" y1="220" x2="320" y2="197" stroke="#0b5e0b" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ═══════════════ Plugin contributions (right, unified orange) ═══════════════ -->
  <rect x="290" y="215" width="460" height="116" rx="12" fill="none" stroke="#ca5010" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="520" y="232" text-anchor="middle" fill="#ca5010" font-weight="600" font-size="12">Plugin contributions</text>

  <!-- Plugin MCP Tools -->
  <rect x="302" y="240" width="150" height="82" rx="8" fill="white" stroke="#ca5010" stroke-width="1" filter="url(#shadow)"/>
  <text x="377" y="258" text-anchor="middle" fill="#ca5010" font-weight="600" font-size="11">MCP Tools</text>
  <text x="377" y="274" text-anchor="middle" fill="#555" font-size="10">region_latency</text>
  <text x="377" y="288" text-anchor="middle" fill="#555" font-size="10">list_batch_skus</text>
  <text x="377" y="302" text-anchor="middle" fill="#555" font-size="10">get_avs_skus</text>
  <text x="377" y="316" text-anchor="middle" fill="#888" font-size="9" font-style="italic">your_tool …</text>

  <!-- Chat Modes -->
  <rect x="462" y="240" width="118" height="82" rx="8" fill="white" stroke="#ca5010" stroke-width="1" filter="url(#shadow)"/>
  <text x="521" y="258" text-anchor="middle" fill="#ca5010" font-weight="600" font-size="11">Chat Modes</text>
  <!-- Built-in pills -->
  <rect x="470" y="265" width="54" height="16" rx="8" fill="#107c10"/>
  <text x="497" y="277" text-anchor="middle" fill="white" font-size="8" font-weight="500">Planner</text>
  <!-- Plugin example pill -->
  <rect x="470" y="285" width="70" height="16" rx="8" fill="white" stroke="#ca5010" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="505" y="297" text-anchor="middle" fill="#ca5010" font-size="8" font-weight="500">AVS Advisor</text>
  <rect x="470" y="305" width="30" height="12" rx="6" fill="white" stroke="#ca5010" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="485" y="314" text-anchor="middle" fill="#ca5010" font-size="8">+</text>

  <!-- Prompt Addenda -->
  <rect x="590" y="240" width="150" height="82" rx="8" fill="white" stroke="#ca5010" stroke-width="1" filter="url(#shadow)"/>
  <text x="665" y="258" text-anchor="middle" fill="#ca5010" font-weight="600" font-size="11">Prompt</text>
  <text x="665" y="272" text-anchor="middle" fill="#ca5010" font-weight="600" font-size="11">Addenda</text>
  <text x="665" y="292" text-anchor="middle" fill="#888" font-size="9">Extra guidance</text>
  <text x="665" y="305" text-anchor="middle" fill="#888" font-size="9">injected into</text>
  <text x="665" y="318" text-anchor="middle" fill="#888" font-size="9">discussion mode</text>

  <!-- Arrow Plugin group → MCP -->
  <line x1="520" y1="215" x2="465" y2="197" stroke="#ca5010" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>

  <!-- ═══════════════ Legend ═══════════════ -->
  <rect x="30" y="345" width="720" height="28" rx="6" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <rect x="50" y="353" width="12" height="12" rx="3" fill="url(#greenGrad)"/>
  <text x="68" y="363" fill="#555" font-size="10">Core (built-in)</text>
  <rect x="165" y="353" width="12" height="12" rx="3" fill="url(#purpleGrad)"/>
  <text x="183" y="363" fill="#555" font-size="10">MCP layer</text>
  <rect x="260" y="353" width="12" height="12" rx="3" fill="url(#azureBlue)"/>
  <text x="278" y="363" fill="#555" font-size="10">Consumers</text>
  <rect x="355" y="353" width="12" height="12" rx="3" fill="white" stroke="#ca5010" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="373" y="363" fill="#555" font-size="10">Plugin-contributed (tools, chat modes, prompt addenda)</text>
</svg>
