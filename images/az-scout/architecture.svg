<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="azureBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#107c10"/>
      <stop offset="100%" stop-color="#0b5e0b"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8764b8"/>
      <stop offset="100%" stop-color="#6b4fa0"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ca5010"/>
      <stop offset="100%" stop-color="#a5400d"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#008272"/>
      <stop offset="100%" stop-color="#006659"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" rx="12" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#333">az-scout architecture</text>

  <!-- ═══════════════ Web UI ═══════════════ -->
  <rect x="240" y="48" width="240" height="56" rx="10" fill="url(#azureBlue)" filter="url(#shadow)"/>
  <text x="360" y="72" text-anchor="middle" fill="white" font-weight="600" font-size="14">Web UI</text>
  <text x="360" y="90" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">Vanilla JS · D3.js · Bootstrap</text>

  <!-- Arrows from UI -->
  <line x1="310" y1="104" x2="230" y2="140" stroke="#666" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="410" y1="104" x2="490" y2="140" stroke="#666" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ═══════════════ FastAPI Routes ═══════════════ -->
  <rect x="100" y="140" width="200" height="56" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="200" y="164" text-anchor="middle" fill="white" font-weight="600" font-size="14">FastAPI Routes</text>
  <text x="200" y="182" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">REST API · /api/*</text>

  <!-- ═══════════════ MCP Server ═══════════════ -->
  <rect x="420" y="140" width="200" height="56" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="520" y="164" text-anchor="middle" fill="white" font-weight="600" font-size="14">MCP Server</text>
  <text x="520" y="182" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">Streamable HTTP · stdio</text>

  <!-- AI agents label -->
  <rect x="580" y="115" width="120" height="30" rx="6" fill="#f0e6ff" stroke="#8764b8" stroke-width="1"/>
  <text x="640" y="135" text-anchor="middle" fill="#6b4fa0" font-size="11" font-weight="500">AI Agents</text>
  <line x1="580" y1="145" x2="555" y2="155" stroke="#8764b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrows down to azure_api -->
  <line x1="200" y1="196" x2="290" y2="240" stroke="#666" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="520" y1="196" x2="430" y2="240" stroke="#666" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ═══════════════ azure_api ═══════════════ -->
  <rect x="200" y="240" width="320" height="72" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="360" y="264" text-anchor="middle" fill="white" font-weight="700" font-size="15">azure_api</text>
  <text x="360" y="282" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">arm_get · arm_post · arm_paginate</text>
  <text x="360" y="298" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">Auth · Retry · Caching · Error handling</text>

  <!-- Arrow down to ARM -->
  <line x1="360" y1="312" x2="360" y2="348" stroke="#666" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ═══════════════ Azure Resource Manager ═══════════════ -->
  <rect x="220" y="348" width="280" height="48" rx="10" fill="url(#tealGrad)" filter="url(#shadow)"/>
  <text x="360" y="372" text-anchor="middle" fill="white" font-weight="600" font-size="14">Azure Resource Manager</text>
  <text x="360" y="386" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">management.azure.com</text>

  <!-- ═══════════════ Plugins (side) ═══════════════ -->
  <rect x="30" y="235" width="150" height="126" rx="10" fill="white" stroke="#0078d4" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="105" y="258" text-anchor="middle" fill="#0078d4" font-weight="600" font-size="13">Plugins</text>
  <text x="105" y="276" text-anchor="middle" fill="#555" font-size="10">Routes · MCP tools</text>
  <text x="105" y="292" text-anchor="middle" fill="#555" font-size="10">UI tabs · Chat modes</text>
  <text x="105" y="308" text-anchor="middle" fill="#555" font-size="10">Static assets</text>
  <line x1="56" y1="316" x2="154" y2="316" stroke="#ddd" stroke-width="1"/>
  <text x="105" y="334" text-anchor="middle" fill="#888" font-size="9" font-style="italic">pip install</text>
  <text x="105" y="348" text-anchor="middle" fill="#888" font-size="9" font-style="italic">auto-discovered</text>

  <!-- Plugin arrows: to FastAPI Routes, to azure_api, and to MCP Server -->
  <line x1="180" y1="260" x2="200" y2="260" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <line x1="130" y1="235" x2="165" y2="196" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <line x1="155" y1="235" x2="420" y2="185" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>

  <!-- ═══════════════ Legend ═══════════════ -->
  <rect x="30" y="420" width="660" height="80" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="50" y="442" fill="#666" font-size="11" font-weight="600">Legend</text>

  <rect x="50" y="454" width="14" height="14" rx="3" fill="url(#azureBlue)"/>
  <text x="70" y="466" fill="#555" font-size="10">Frontend</text>

  <rect x="140" y="454" width="14" height="14" rx="3" fill="url(#greenGrad)"/>
  <text x="160" y="466" fill="#555" font-size="10">API layer</text>

  <rect x="230" y="454" width="14" height="14" rx="3" fill="url(#purpleGrad)"/>
  <text x="250" y="466" fill="#555" font-size="10">MCP</text>

  <rect x="300" y="454" width="14" height="14" rx="3" fill="url(#orangeGrad)"/>
  <text x="320" y="466" fill="#555" font-size="10">Core ARM helpers</text>

  <rect x="430" y="454" width="14" height="14" rx="3" fill="url(#tealGrad)"/>
  <text x="450" y="466" fill="#555" font-size="10">Azure</text>

  <rect x="510" y="454" width="14" height="14" rx="3" fill="white" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="530" y="466" fill="#555" font-size="10">Plugins (auto-discovered)</text>

  <text x="50" y="490" fill="#999" font-size="9">All Azure interactions flow through azure_api — plugins and core share the same auth, retry, and caching layer.</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0078d4"/>
    </marker>
  </defs>
</svg>
