<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ba0ff"/>
      <stop offset="100%" stop-color="#0078d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" fill="url(#bg)" rx="0"/>

  <!-- Subtle grid dots -->
  <g opacity="0.08" fill="white">
    <circle cx="40" cy="40" r="1"/><circle cx="80" cy="40" r="1"/><circle cx="120" cy="40" r="1"/><circle cx="160" cy="40" r="1"/><circle cx="200" cy="40" r="1"/><circle cx="240" cy="40" r="1"/><circle cx="280" cy="40" r="1"/><circle cx="320" cy="40" r="1"/><circle cx="360" cy="40" r="1"/>
    <circle cx="40" cy="80" r="1"/><circle cx="80" cy="80" r="1"/><circle cx="120" cy="80" r="1"/><circle cx="160" cy="80" r="1"/><circle cx="200" cy="80" r="1"/><circle cx="240" cy="80" r="1"/><circle cx="280" cy="80" r="1"/><circle cx="320" cy="80" r="1"/><circle cx="360" cy="80" r="1"/>
    <circle cx="40" cy="120" r="1"/><circle cx="80" cy="120" r="1"/><circle cx="120" cy="120" r="1"/><circle cx="160" cy="120" r="1"/><circle cx="200" cy="120" r="1"/><circle cx="240" cy="120" r="1"/><circle cx="280" cy="120" r="1"/><circle cx="320" cy="120" r="1"/><circle cx="360" cy="120" r="1"/>
    <circle cx="40" cy="160" r="1"/><circle cx="80" cy="160" r="1"/><circle cx="120" cy="160" r="1"/><circle cx="160" cy="160" r="1"/><circle cx="200" cy="160" r="1"/><circle cx="240" cy="160" r="1"/><circle cx="280" cy="160" r="1"/><circle cx="320" cy="160" r="1"/><circle cx="360" cy="160" r="1"/>
    <circle cx="40" cy="200" r="1"/><circle cx="80" cy="200" r="1"/><circle cx="120" cy="200" r="1"/><circle cx="160" cy="200" r="1"/><circle cx="200" cy="200" r="1"/><circle cx="240" cy="200" r="1"/><circle cx="280" cy="200" r="1"/><circle cx="320" cy="200" r="1"/><circle cx="360" cy="200" r="1"/>
  </g>

  <!-- Location pin (scaled from favicon) -->
  <g transform="translate(175, 5) scale(2.2)">
    <path d="M16 2C10.48 2 6 6.48 6 12c0 7 10 18 10 18s10-11 10-18c0-5.52-4.48-10-10-10z" fill="url(#pin)" opacity="0.95"/>
    <line x1="11" y1="9" x2="21" y2="13" stroke="#fff" stroke-width="1" opacity="0.6"/>
    <line x1="11" y1="13" x2="21" y2="9" stroke="#fff" stroke-width="1" opacity="0.6"/>
    <line x1="11" y1="17" x2="21" y2="17" stroke="#fff" stroke-width="1" opacity="0.6"/>
    <circle cx="11" cy="9" r="1.8" fill="#fff"/>
    <circle cx="11" cy="13" r="1.8" fill="#fff"/>
    <circle cx="11" cy="17" r="1.8" fill="#fff"/>
    <circle cx="21" cy="9" r="1.8" fill="#fff"/>
    <circle cx="21" cy="13" r="1.8" fill="#fff"/>
    <circle cx="21" cy="17" r="1.8" fill="#fff"/>
  </g>

  <!-- Title -->
  <text x="200" y="120" text-anchor="middle" fill="white" font-size="56" font-weight="700" letter-spacing="-1.5">az-scout</text>

  <!-- Subtitle -->
  <text x="200" y="170" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="22" font-weight="400">Scout Azure regions</text>

  <!-- Accent line -->
  <rect x="120" y="208" width="160" height="3" rx="1.5" fill="#0078d4" opacity="0.7"/>
</svg>
